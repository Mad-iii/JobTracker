version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: jobtracker_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: jobtracker
    networks:
      - jobtracker_net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: jobtracker_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/jobtracker
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:5173
    depends_on:
      - mongo
    networks:
      - jobtracker_net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: jobtracker_client
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server
    networks:
      - jobtracker_net

volumes:
  mongo_data:

networks:
  jobtracker_net:
    driver: bridge
