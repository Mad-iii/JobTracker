name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  server-lint:
    name: Server â€” Install & Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install server deps
        run: cd server && npm ci
      - name: Check server starts
        run: |
          cd server
          cp .env.example .env
          echo "JWT_SECRET=ci_test_secret" >> .env
          echo "MONGO_URI=mongodb://localhost:27017/jobtracker_test" >> .env
          timeout 5 node server.js || true

  client-build:
    name: Client â€” Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install client deps
        run: cd client && npm ci
      - name: Build client
        run: cd client && npm run build
